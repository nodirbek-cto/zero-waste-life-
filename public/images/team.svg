<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5A4"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="overlay" x1="600" y1="500" x2="600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" rx="72" fill="url(#bg)"/>
  <circle cx="260" cy="260" r="140" fill="#FFFFFF" fill-opacity="0.14"/>
  <circle cx="1020" cy="220" r="180" fill="#FFFFFF" fill-opacity="0.10"/>
  <circle cx="880" cy="680" r="260" fill="#000000" fill-opacity="0.08"/>

  <g fill="#FFFFFF" fill-opacity="0.92">
    <circle cx="440" cy="520" r="52"/>
    <circle cx="600" cy="480" r="66"/>
    <circle cx="770" cy="520" r="52"/>
  </g>

  <g fill="#FFFFFF" fill-opacity="0.22">
    <rect x="376" y="590" width="128" height="170" rx="64"/>
    <rect x="524" y="570" width="152" height="210" rx="76"/>
    <rect x="706" y="590" width="128" height="170" rx="64"/>
  </g>

  <rect y="500" width="1200" height="400" fill="url(#overlay)"/>

  <g fill="#FFFFFF" fill-opacity="0.9">
    <text x="80" y="820" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="44" font-weight="700">
      Our team
    </text>
    <text x="80" y="868" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="24" font-weight="400" fill-opacity="0.85">
      Building eco impact together
    </text>
  </g>
</svg>
